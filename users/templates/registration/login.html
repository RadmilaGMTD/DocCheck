<!DOCTYPE html>
<html>
<head>
    <title>Вход в систему</title>
</head>
<body>
    <h2>Вход</h2>

    {% if form.errors %}
        <p style="color: red">Неверные имя пользователя или пароль.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
    </form>

    <p>
        Нет аккаунта? <a href="/users/create/">Зарегистрируйтесь</a><br>
        Или используйте <a href="/users/token/">JWT-токен</a> для API
    </p>
</body>
</html>
